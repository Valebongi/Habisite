spring:
  application:
    name: habisite-backend

  # datasource configurada en DataSourceConfig.java (soporta DATABASE_URL de Railway y PG* vars)

  sql:
    init:
      mode: always                # Ejecuta schema.sql al arrancar (CREATE TABLE IF NOT EXISTS)

  jpa:
    defer-datasource-initialization: true   # JPA espera a que schema.sql termine antes de validar
    hibernate:
      ddl-auto: none              # Schema gestionado vía scripts SQL, Hibernate no toca nada
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  # Railway inyecta PORT en producción; 8080 es el default local
  port: ${PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.imb.habisite: DEBUG
    org.hibernate.SQL: INFO
