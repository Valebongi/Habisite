spring:
  application:
    name: habisite-backend

  datasource:
    # Railway inyecta PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automáticamente.
    # Los valores después de ":" son los defaults para desarrollo local.
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:habisite}
    username: ${PGUSER:habisite_user}
    password: ${PGPASSWORD:habisite_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5        # Ajustado para el plan gratuito de Railway

  jpa:
    hibernate:
      ddl-auto: none              # Schema gestionado vía scripts SQL, Hibernate no toca nada
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  # Railway inyecta PORT en producción; 8080 es el default local
  port: ${PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.imb.habisite: DEBUG
    org.hibernate.SQL: INFO
