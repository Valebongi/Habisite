<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Postulante · Habisite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
    }

    .card-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
    }

    .card-header p {
      margin-top: .4rem;
      font-size: .875rem;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .4rem;
    }

    label .req {
      color: #ef4444;
      margin-left: 2px;
    }

    input {
      width: 100%;
      padding: .625rem .875rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .9375rem;
      color: #111827;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input::placeholder { color: #9ca3af; }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }

    input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,.12);
    }

    .field-error {
      font-size: .78rem;
      color: #ef4444;
      margin-top: .3rem;
      display: none;
    }

    .field-error.visible { display: block; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 1.5rem;
      padding: .75rem;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }

    button[type="submit"]:hover  { background: #1d4ed8; }
    button[type="submit"]:active { background: #1e40af; }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }

    /* Alert banners */
    .alert {
      display: none;
      border-radius: 8px;
      padding: .875rem 1rem;
      font-size: .875rem;
      margin-top: 1.25rem;
      line-height: 1.5;
    }

    .alert.visible { display: block; }

    .alert-success {
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      color: #166534;
    }

    .alert-error {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      color: #991b1b;
    }

    .alert strong { display: block; margin-bottom: .25rem; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Registro de Postulante</h1>
    <p>Todos los campos son obligatorios.</p>
  </div>

  <form id="form" novalidate>

    <div class="row">
      <div class="form-group">
        <label for="nombres">Nombres <span class="req">*</span></label>
        <input id="nombres" name="nombres" type="text" placeholder="Juan Carlos" autocomplete="given-name" />
        <span class="field-error" id="err-nombres"></span>
      </div>
      <div class="form-group">
        <label for="apellidos">Apellidos <span class="req">*</span></label>
        <input id="apellidos" name="apellidos" type="text" placeholder="Pérez García" autocomplete="family-name" />
        <span class="field-error" id="err-apellidos"></span>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="dni">DNI <span class="req">*</span></label>
        <input id="dni" name="dni" type="text" placeholder="12345678" maxlength="8" inputmode="numeric" />
        <span class="field-error" id="err-dni"></span>
      </div>
      <div class="form-group">
        <label for="celular">Celular <span class="req">*</span></label>
        <input id="celular" name="celular" type="tel" placeholder="987654321" autocomplete="tel" />
        <span class="field-error" id="err-celular"></span>
      </div>
    </div>

    <div class="form-group">
      <label for="universidad">Universidad <span class="req">*</span></label>
      <input id="universidad" name="universidad" type="text" placeholder="Tu universidad" autocomplete="organization" />
      <span class="field-error" id="err-universidad"></span>
    </div>

    <div class="form-group">
      <label for="correoElectronico">Correo Electrónico <span class="req">*</span></label>
      <input id="correoElectronico" name="correoElectronico" type="email" placeholder="tu@email.com" autocomplete="email" />
      <span class="field-error" id="err-correoElectronico"></span>
    </div>

    <div class="form-group">
      <label for="especialidad">Especialidad <span class="req">*</span></label>
      <input id="especialidad" name="especialidad" type="text" placeholder="Ingeniería Civil" />
      <span class="field-error" id="err-especialidad"></span>
    </div>

    <button type="submit" id="btn-submit">Registrarme</button>

    <div class="alert alert-success" id="alert-ok">
      <strong>¡Registro exitoso!</strong>
      Tu postulación fue enviada correctamente.
    </div>
    <div class="alert alert-error" id="alert-err">
      <strong>Error al registrar</strong>
      <span id="alert-err-msg"></span>
    </div>

  </form>
</div>

<script>
  const API = 'https://api.habisite.com/api/v1/postulantes';

  const rules = {
    nombres:           { msg: 'Ingresá tus nombres.',         test: v => v.trim().length > 0 },
    apellidos:         { msg: 'Ingresá tus apellidos.',       test: v => v.trim().length > 0 },
    dni:               { msg: 'El DNI debe tener 8 dígitos.', test: v => /^\d{8}$/.test(v.trim()) },
    celular:           { msg: 'Ingresá un celular válido.',   test: v => /^[0-9+\-\s]{7,15}$/.test(v.trim()) },
    universidad:       { msg: 'Ingresá tu universidad.',      test: v => v.trim().length > 0 },
    correoElectronico: { msg: 'Ingresá un correo válido.',    test: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) },
    especialidad:      { msg: 'Ingresá tu especialidad.',     test: v => v.trim().length > 0 },
  };

  function setError(field, msg) {
    document.getElementById(field).classList.add('error');
    const el = document.getElementById('err-' + field);
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearError(field) {
    document.getElementById(field).classList.remove('error');
    const el = document.getElementById('err-' + field);
    el.textContent = '';
    el.classList.remove('visible');
  }

  function validate() {
    let ok = true;
    for (const [field, rule] of Object.entries(rules)) {
      const val = document.getElementById(field).value;
      if (!rule.test(val)) { setError(field, rule.msg); ok = false; }
      else clearError(field);
    }
    return ok;
  }

  // Limpiar error al escribir
  Object.keys(rules).forEach(field => {
    document.getElementById(field).addEventListener('input', () => clearError(field));
  });

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    document.getElementById('alert-ok').classList.remove('visible');
    document.getElementById('alert-err').classList.remove('visible');

    if (!validate()) return;

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enviando...';

    const body = {};
    Object.keys(rules).forEach(f => body[f] = document.getElementById(f).value.trim());

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (res.ok) {
        document.getElementById('form').reset();
        document.getElementById('alert-ok').classList.add('visible');
      } else {
        const data = await res.json().catch(() => ({}));
        let msg = data.mensaje || data.message || `Error ${res.status}.`;
        if (data.errores) {
          msg = Object.values(data.errores).join(' ');
        }
        document.getElementById('alert-err-msg').textContent = msg;
        document.getElementById('alert-err').classList.add('visible');
      }
    } catch {
      document.getElementById('alert-err-msg').textContent = 'No se pudo conectar con el servidor.';
      document.getElementById('alert-err').classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Registrarme';
    }
  });
</script>

</body>
</html>
